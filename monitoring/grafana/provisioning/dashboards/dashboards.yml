# Grafana dashboard provisioning.
#
# Tells Grafana to load every dashboard JSON it finds in the mounted folder, so
# the workshop dashboard appears automatically with no import step.
apiVersion: 1

providers:
  - name: "workshop"
    orgId: 1
    folder: "Workshop"
    type: file
    disableDeletion: false
    editable: true          # let learners tweak panels and see what happens
    options:
      path: /var/lib/grafana/dashboards
