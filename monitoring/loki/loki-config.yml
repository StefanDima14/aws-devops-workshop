# Minimal single-binary Loki config for local use.
#
# Loki stores logs the way Prometheus stores metrics: indexed by labels. This
# config runs everything in one process with local filesystem storage — perfect
# for a laptop demo, not what you'd run in production.
auth_enabled: false

server:
  http_listen_port: 3100
  log_level: warn

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2020-10-24
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

# Keep the demo forgiving: allow old timestamps and don't rate-limit ingestion.
limits_config:
  reject_old_samples: false
  allow_structured_metadata: false

# Don't phone home.
analytics:
  reporting_enabled: false
