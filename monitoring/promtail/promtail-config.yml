# Promtail configuration.
#
# Promtail is the "agent" that finds logs and pushes them to Loki. Here it uses
# Docker service discovery: it asks the Docker daemon for the list of running
# containers and tails each one's stdout/stderr, attaching useful labels
# (container name, compose service) so you can filter in Grafana.
server:
  http_listen_port: 9080
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Expose the container name (e.g. "workshop-app") as a `container` label.
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: "container"
      # Expose the compose service name as a `service` label when present.
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: "service"
      # A static job label so `{job="docker"}` selects everything.
      - target_label: "job"
        replacement: "docker"
