# =============================================================================
# node-exporter — host/node-level metrics (CPU, memory, disk, filesystem of the
# machine itself, not individual containers).
#
# Another DaemonSet: one per node, each reading its own node's /proc and /sys.
# Prometheus scrapes it as "node-exporter:9100" via the Service below.
# =============================================================================
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-exporter
  namespace: workshop
  labels:
    app: node-exporter
spec:
  selector:
    matchLabels:
      app: node-exporter
  template:
    metadata:
      labels:
        app: node-exporter
    spec:
      # hostNetwork/hostPID let the exporter observe the node's real namespaces.
      hostNetwork: true
      hostPID: true
      containers:
        - name: node-exporter
          image: prom/node-exporter:v1.8.1
          args:
            - "--path.procfs=/host/proc"
            - "--path.sysfs=/host/sys"
            - "--path.rootfs=/host/root"
          ports:
            - containerPort: 9100
          volumeMounts:
            - { name: proc, mountPath: /host/proc, readOnly: true }
            - { name: sys, mountPath: /host/sys, readOnly: true }
            - { name: root, mountPath: /host/root, readOnly: true }
      volumes:
        - { name: proc, hostPath: { path: /proc } }
        - { name: sys, hostPath: { path: /sys } }
        - { name: root, hostPath: { path: / } }
---
apiVersion: v1
kind: Service
metadata:
  name: node-exporter
  namespace: workshop
  labels:
    app: node-exporter
spec:
  selector:
    app: node-exporter
  ports:
    - name: metrics
      port: 9100
      targetPort: 9100
