<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AWS DevOps Workshop</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <main class="container">
    <header>
      <h1>🚀 Deployed on AWS via CI/CD</h1>
      <p class="subtitle">Flask &middot; Docker &middot; Terraform &middot; GitHub Actions &middot; EC2</p>
    </header>

    <section class="media">
      <!-- Shown first: the poster image + a button to reveal the video. -->
      <div class="poster" id="poster">
        <div class="poster-frame">
          <img src="{{ url_for('static', filename='image.png') }}" alt="Video preview" />
        </div>
        <button type="button" class="watch-btn" id="watch-btn">▶ Watch a video</button>
      </div>

      <!-- Hidden until the button is clicked. -->
      <div class="video-wrapper hidden" id="player">
        <video id="video" controls playsinline>
          <source src="{{ video_url }}" type="video/mp4" />
          Your browser does not support the video tag.
        </video>
      </div>
    </section>

    <script>
      (function () {
        var poster = document.getElementById("poster");
        var player = document.getElementById("player");
        var video = document.getElementById("video");

        function reveal() {
          poster.classList.add("hidden");
          player.classList.remove("hidden");
          video.play().catch(function () {
            /* If autoplay is blocked, the controls let the user press play. */
          });
        }

        poster.addEventListener("click", reveal);
      })();
    </script>

    <footer>
      <span class="badge">version: {{ version }}</span>
      <span class="badge">host: {{ hostname }}</span>
    </footer>
  </main>
</body>
</html>
