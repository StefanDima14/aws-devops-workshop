name: Infrastructure (Terraform)

# Manual only: you choose plan / apply / destroy from the Actions tab, so the
# infrastructure is never created or torn down by an accidental push.
on:
  workflow_dispatch:
    inputs:
      action:
        description: "What to run"
        type: choice
        options:
          - plan
          - apply
          - destroy
        default: plan
      confirm_destroy:
        description: 'Destroy only: type "destroy" to confirm'
        type: string
        default: ""

# Never let two infra runs mutate state at once.
concurrency:
  group: infra-${{ github.ref }}
  cancel-in-progress: false

# OIDC for keyless AWS auth.
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-1
  TF_VERSION: "1.9.5"
  # Terraform variables supplied to every command (no secrets in state inputs).
  TF_VAR_github_repo: ${{ github.repository }}
  TF_VAR_my_ip_cidr: ${{ vars.MY_IP_CIDR || '0.0.0.0/32' }}

jobs:
  terraform:
    name: "Terraform: ${{ inputs.action }}"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      # Destroying is irreversible, so make it deliberate: the run fails unless
      # the operator typed the confirmation word.
      - name: Guard the destroy action
        if: inputs.action == 'destroy' && inputs.confirm_destroy != 'destroy'
        run: |
          echo "::error::Refusing to destroy: re-run and type 'destroy' in the confirm_destroy box."
          exit 1

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (via OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TF_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform fmt (check)
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="key=devops-workshop/terraform.tfstate"

      - name: Terraform validate
        run: terraform validate -no-color

      # Always plan first — for "destroy" this is the same plan, in reverse. The
      # plan is written to the run summary so students can read it before it runs.
      - name: Terraform plan
        id: plan
        run: |
          if [ "${{ inputs.action }}" = "destroy" ]; then
            terraform plan -destroy -no-color -input=false -out=tfplan | tee plan.txt
          else
            terraform plan -no-color -input=false -out=tfplan | tee plan.txt
          fi
          {
            echo "### Terraform plan (${{ inputs.action }})"
            echo '```'
            tail -c 60000 plan.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # Execute the exact plan we just showed. `terraform apply` is also what runs
      # a destroy plan — the saved plan already encodes the direction.
      - name: Terraform apply
        if: inputs.action == 'apply' || inputs.action == 'destroy'
        run: terraform apply -no-color -input=false -auto-approve tfplan
